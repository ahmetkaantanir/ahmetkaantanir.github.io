<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="belly" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="fire1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fire2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fireGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- FIRE BREATH — layered flames -->
  <path d="M100,44 Q112,32 108,18 Q116,28 114,14 Q120,24 116,10" fill="none" stroke="url(#fire1)" stroke-width="5" stroke-linecap="round" filter="url(#fireGlow)" opacity="0.9"/>
  <path d="M102,48 Q114,38 112,26 Q118,34 116,22" fill="none" stroke="url(#fire2)" stroke-width="3.5" stroke-linecap="round" filter="url(#fireGlow)" opacity="0.85"/>
  <path d="M98,42 Q106,34 104,24 Q110,30 108,20" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- fire sparks -->
  <circle cx="112" cy="12" r="2" fill="#f59e0b" opacity="0.7" filter="url(#fireGlow)"/>
  <circle cx="118" cy="18" r="1.5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="106" cy="16" r="1.2" fill="#ef4444" opacity="0.6"/>

  <!-- TAIL -->
  <path d="M16,108 C8,100 4,88 10,78 C14,72 20,68 26,66" fill="none" stroke="url(#body)" stroke-width="8" stroke-linecap="round"/>
  <!-- tail spike -->
  <polygon points="8,112 16,104 12,96 4,102" fill="url(#body)"/>

  <!-- BODY — big round shape like Linux Tux style -->
  <ellipse cx="54" cy="82" rx="32" ry="34" fill="url(#body)"/>
  <!-- belly patch — lighter -->
  <ellipse cx="56" cy="88" rx="18" ry="22" fill="url(#belly)" opacity="0.15"/>

  <!-- NECK -->
  <path d="M52,50 C46,56 40,64 42,72 C44,64 50,56 58,50Z" fill="url(#body)"/>
  <path d="M58,48 C62,54 64,62 62,72 C60,62 56,54 52,50Z" fill="url(#body)"/>

  <!-- HEAD — prominent dragon head -->
  <path d="M34,52 C28,44 30,32 40,26 C48,22 60,22 70,28 C80,34 86,44 84,52 C82,58 76,62 68,62 C58,62 46,60 38,56 C34,54 34,52 34,52Z" fill="url(#body)"/>

  <!-- Snout/muzzle — elongated -->
  <path d="M76,38 C84,34 94,36 98,44 C96,50 90,52 82,50 C76,48 74,44 76,38Z" fill="url(#body)"/>

  <!-- BELLY SCALES — visible lighter patches -->
  <path d="M42,76 C46,74 52,74 56,76" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <path d="M40,82 C46,80 54,80 58,82" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.18" stroke-linecap="round"/>
  <path d="M42,88 C47,86 53,86 58,88" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>
  <path d="M44,94 C48,92 52,92 56,94" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.12" stroke-linecap="round"/>

  <!-- BACK SPINES — 5 big spikes along back -->
  <polygon points="38,54 28,36 44,48" fill="#8b5cf6"/>
  <polygon points="42,48 30,26 50,42" fill="#8b5cf6"/>
  <polygon points="48,42 38,18 54,36" fill="#7c3aed"/>
  <polygon points="52,38 46,14 58,32" fill="#7c3aed"/>
  <polygon points="56,34 52,10 62,28" fill="#6d28d9"/>

  <!-- HORNS — two big horns on head top -->
  <polygon points="46,28 36,6 52,24" fill="#a78bfa"/>
  <polygon points="58,24 56,2 64,20" fill="#a78bfa"/>
  <!-- horn highlights -->
  <line x1="40" y1="16" x2="48" y2="26" stroke="#c4b5fd" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="56" y1="8" x2="60" y2="22" stroke="#c4b5fd" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>

  <!-- EYE — large, glowing, with slit pupil -->
  <ellipse cx="68" cy="40" rx="9" ry="8" fill="#0a0e17"/>
  <ellipse cx="68" cy="40" rx="7" ry="6.5" fill="#06b6d4" filter="url(#glow)"/>
  <ellipse cx="69" cy="40" rx="2" ry="6" fill="#0a0e17"/>
  <!-- eye shine -->
  <circle cx="65" cy="37" r="2.5" fill="#fff" opacity="0.95"/>
  <circle cx="71" cy="43" r="1" fill="#fff" opacity="0.4"/>

  <!-- Brow ridge -->
  <path d="M58,34 C62,30 72,30 80,36" fill="none" stroke="#0a0e17" stroke-width="3" opacity="0.3" stroke-linecap="round"/>

  <!-- NOSTRILS -->
  <ellipse cx="92" cy="40" rx="2.5" ry="2" fill="#0a0e17" opacity="0.6"/>
  <ellipse cx="92" cy="46" rx="2" ry="1.5" fill="#0a0e17" opacity="0.4"/>
  <!-- nostril smoke wisps -->
  <path d="M94,38 Q98,36 96,32" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.2" stroke-linecap="round"/>

  <!-- MOUTH LINE -->
  <path d="M78,52 C84,54 92,52 98,46" fill="none" stroke="#0a0e17" stroke-width="2" opacity="0.35" stroke-linecap="round"/>

  <!-- JAW underline -->
  <path d="M38,56 C48,64 62,66 76,60 C82,56 88,52 94,48" fill="none" stroke="url(#body)" stroke-width="3" opacity="0.4" stroke-linecap="round"/>

  <!-- ARMS/CLAWS — small front arms like Tux -->
  <path d="M36,78 C30,82 26,88 28,92 C30,88 34,84 38,82Z" fill="url(#body)" opacity="0.9"/>
  <path d="M72,78 C78,82 82,88 80,92 C78,88 74,84 70,82Z" fill="url(#body)" opacity="0.9"/>
  <!-- claw tips -->
  <circle cx="27" cy="93" r="2" fill="#a78bfa" opacity="0.7"/>
  <circle cx="81" cy="93" r="2" fill="#a78bfa" opacity="0.7"/>

  <!-- FEET — stubby feet at bottom -->
  <ellipse cx="40" cy="114" rx="12" ry="6" fill="url(#body)" opacity="0.9"/>
  <ellipse cx="68" cy="114" rx="12" ry="6" fill="url(#body)" opacity="0.9"/>
  <!-- toe claws -->
  <circle cx="30" cy="114" r="2" fill="#a78bfa" opacity="0.6"/>
  <circle cx="36" cy="116" r="1.8" fill="#a78bfa" opacity="0.6"/>
  <circle cx="78" cy="114" r="2" fill="#a78bfa" opacity="0.6"/>
  <circle cx="72" cy="116" r="1.8" fill="#a78bfa" opacity="0.6"/>

  <!-- WING hint — folded wing behind body -->
  <path d="M24,62 C14,50 12,36 18,28 C22,34 24,44 26,56Z" fill="#8b5cf6" opacity="0.3"/>
  <path d="M22,66 C10,56 6,42 10,32 C16,40 20,52 24,62Z" fill="#6d28d9" opacity="0.2"/>

  <!-- SCALE TEXTURE on head -->
  <circle cx="56" cy="44" r="2.5" fill="#22d3ee" opacity="0.1"/>
  <circle cx="62" cy="50" r="2.5" fill="#22d3ee" opacity="0.08"/>
  <circle cx="50" cy="50" r="2" fill="#a78bfa" opacity="0.08"/>
  <circle cx="72" cy="50" r="2" fill="#22d3ee" opacity="0.08"/>
</svg>