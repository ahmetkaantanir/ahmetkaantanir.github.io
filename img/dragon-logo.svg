<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="drg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="horn" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="eyeGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Neck spikes -->
  <polygon points="8,44 4,32 14,38" fill="url(#drg)" opacity="0.6"/>
  <polygon points="12,38 6,24 18,32" fill="url(#drg)" opacity="0.7"/>
  <polygon points="16,32 10,16 22,26" fill="url(#drg)" opacity="0.8"/>

  <!-- Main head -->
  <path d="M12,46 C8,40 8,30 14,24 C20,18 30,16 38,18 C46,20 54,26 56,34 C58,40 56,46 50,48 C44,50 36,50 28,48 C22,46 16,46 12,46Z" fill="url(#drg)"/>

  <!-- Head top ridge -->
  <path d="M22,22 C26,18 32,16 38,18" fill="none" stroke="url(#horn)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Horn 1 - back -->
  <path d="M18,24 L8,6 L24,20" fill="url(#horn)" opacity="0.9"/>
  <!-- Horn 2 - front -->
  <path d="M28,18 L24,2 L34,16" fill="url(#horn)"/>

  <!-- Brow ridge -->
  <path d="M30,26 C36,22 44,22 50,28" fill="none" stroke="#0a0e17" stroke-width="2" opacity="0.3" stroke-linecap="round"/>

  <!-- Eye socket -->
  <ellipse cx="42" cy="30" rx="6" ry="5.5" fill="#0a0e17" opacity="0.7"/>
  <!-- Eye -->
  <ellipse cx="43" cy="30" rx="4" ry="4.5" fill="#06b6d4" filter="url(#eyeGlow)"/>
  <!-- Pupil - slit -->
  <ellipse cx="44" cy="30" rx="1.2" ry="4" fill="#0a0e17"/>
  <!-- Eye highlight -->
  <circle cx="41" cy="28" r="1.3" fill="#fff" opacity="0.9"/>

  <!-- Snout -->
  <path d="M50,34 C54,32 58,34 60,38 C58,40 54,40 50,38Z" fill="url(#drg)" opacity="0.85"/>
  <!-- Nostril -->
  <ellipse cx="56" cy="35" rx="1.8" ry="1.2" fill="#0a0e17" opacity="0.5"/>

  <!-- Jaw -->
  <path d="M28,44 C34,48 42,50 50,46 C54,44 58,42 60,40" fill="none" stroke="url(#drg)" stroke-width="2" opacity="0.4" stroke-linecap="round"/>

  <!-- Scales detail -->
  <circle cx="30" cy="34" r="1.5" fill="#06b6d4" opacity="0.15"/>
  <circle cx="36" cy="36" r="1.5" fill="#06b6d4" opacity="0.15"/>
  <circle cx="24" cy="36" r="1.5" fill="#06b6d4" opacity="0.15"/>
  <circle cx="32" cy="40" r="1.2" fill="#8b5cf6" opacity="0.12"/>
  <circle cx="26" cy="42" r="1.2" fill="#8b5cf6" opacity="0.12"/>

  <!-- Subtle fire wisp from nostril -->
  <path d="M58,34 Q62,30 60,26 Q64,28 62,24" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
</svg>
