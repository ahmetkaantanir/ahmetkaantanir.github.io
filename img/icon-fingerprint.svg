<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="ngl">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ngl2">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Fingerprint ridges — concentric arched lines -->
  <path d="M64,118 C36,118 22,94 22,74" fill="none" stroke="url(#fg)" stroke-width="2.5" stroke-linecap="round" filter="url(#ngl)"/>
  <path d="M64,118 C92,118 106,94 106,74" fill="none" stroke="url(#fg)" stroke-width="2.5" stroke-linecap="round" filter="url(#ngl)"/>
  <path d="M38,74 C38,52 48,36 64,36 C80,36 90,52 90,74" fill="none" stroke="url(#fg)" stroke-width="2.5" stroke-linecap="round" filter="url(#ngl)"/>
  <path d="M46,74 C46,56 52,44 64,44 C76,44 82,56 82,74" fill="none" stroke="url(#fg)" stroke-width="2.5" stroke-linecap="round" filter="url(#ngl)"/>
  <path d="M54,74 C54,62 58,52 64,52 C70,52 74,62 74,74" fill="none" stroke="url(#fg)" stroke-width="2.5" stroke-linecap="round" filter="url(#ngl)"/>
  <path d="M30,74 C30,44 44,24 64,24 C84,24 98,44 98,74" fill="none" stroke="url(#fg)" stroke-width="2.5" stroke-linecap="round" filter="url(#ngl)"/>
  <!-- Center loop -->
  <ellipse cx="64" cy="70" rx="4" ry="8" fill="none" stroke="#06b6d4" stroke-width="2.5" filter="url(#ngl2)"/>
  <!-- Core dot -->
  <circle cx="64" cy="70" r="2.5" fill="#06b6d4" filter="url(#ngl2)"/>
  <!-- Top arc -->
  <path d="M22,74 C22,36 40,14 64,14 C88,14 106,36 106,74" fill="none" stroke="url(#fg)" stroke-width="2.5" stroke-linecap="round" filter="url(#ngl)"/>
  <!-- Glitch/scan line effect -->
  <rect x="18" y="58" width="92" height="2" fill="#06b6d4" opacity="0.12" rx="1"/>
  <rect x="18" y="82" width="92" height="1.5" fill="#8b5cf6" opacity="0.1" rx="1"/>
  <!-- Binary data overlay -->
  <text x="20" y="20" fill="#06b6d4" font-family="monospace" font-size="7" opacity="0.12">01101001</text>
  <text x="70" y="20" fill="#8b5cf6" font-family="monospace" font-size="7" opacity="0.1">11010010</text>
  <text x="20" y="120" fill="#8b5cf6" font-family="monospace" font-size="7" opacity="0.1">10110100</text>
  <text x="70" y="120" fill="#06b6d4" font-family="monospace" font-size="7" opacity="0.12">01001101</text>
  <!-- Scan crosshair -->
  <line x1="64" y1="8" x2="64" y2="20" stroke="#06b6d4" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <line x1="64" y1="118" x2="64" y2="124" stroke="#06b6d4" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <line x1="10" y1="70" x2="20" y2="70" stroke="#06b6d4" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <line x1="108" y1="70" x2="118" y2="70" stroke="#06b6d4" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <!-- Corner brackets (scan frame) -->
  <path d="M16,28 L16,16 L28,16" fill="none" stroke="url(#fg)" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
  <path d="M100,16 L112,16 L112,28" fill="none" stroke="url(#fg)" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
  <path d="M16,100 L16,112 L28,112" fill="none" stroke="url(#fg)" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
  <path d="M100,112 L112,112 L112,100" fill="none" stroke="url(#fg)" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
</svg>