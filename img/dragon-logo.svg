<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Body/neck -->
  <path d="M10,54 C6,46 4,36 8,28 C12,20 18,16 24,14 L20,54Z" fill="url(#g1)" opacity="0.8"/>

  <!-- Main head shape — large and bold -->
  <path d="M8,48 C4,40 4,28 12,20 C18,14 28,10 38,12 C48,14 56,22 58,32 C60,40 56,48 48,50 C40,52 28,52 18,50 C12,48 8,48 8,48Z" fill="url(#g1)"/>

  <!-- Neck spines — thick and visible -->
  <polygon points="12,42 4,28 18,36" fill="url(#g2)" opacity="0.85"/>
  <polygon points="16,34 6,18 22,28" fill="url(#g2)" opacity="0.9"/>
  <polygon points="20,26 12,8 28,20" fill="url(#g2)"/>

  <!-- Horn back -->
  <polygon points="22,18 10,2 30,14" fill="url(#g2)"/>
  <!-- Horn front -->
  <polygon points="34,12 30,0 40,10" fill="url(#g2)"/>

  <!-- Brow/ridge -->
  <path d="M26,22 C32,18 44,18 52,26" fill="none" stroke="url(#g2)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- Snout — prominent -->
  <path d="M48,32 C54,28 60,30 62,36 C60,42 54,42 48,38Z" fill="url(#g1)"/>

  <!-- Eye socket -->
  <ellipse cx="42" cy="28" rx="7" ry="6.5" fill="#0a0e17"/>
  <!-- Eye glow -->
  <ellipse cx="42" cy="28" rx="5.5" ry="5" fill="#06b6d4" filter="url(#glow)"/>
  <!-- Pupil slit -->
  <ellipse cx="43" cy="28" rx="1.5" ry="4.5" fill="#0a0e17"/>
  <!-- Eye shine -->
  <circle cx="39.5" cy="25.5" r="1.8" fill="#fff" opacity="0.95"/>

  <!-- Nostril -->
  <ellipse cx="57" cy="33" rx="2" ry="1.5" fill="#0a0e17" opacity="0.6"/>
  <!-- Nostril 2 -->
  <ellipse cx="57" cy="37" rx="1.5" ry="1" fill="#0a0e17" opacity="0.4"/>

  <!-- Mouth line -->
  <path d="M48,40 C52,42 56,42 60,38" fill="none" stroke="#0a0e17" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>

  <!-- Jaw bottom -->
  <path d="M18,48 C26,54 38,54 48,50 C54,48 58,44 60,40" fill="none" stroke="url(#g1)" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>

  <!-- Under-jaw scales -->
  <path d="M24,50 C28,54 34,56 40,54" fill="none" stroke="url(#g2)" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

  <!-- Fire breath from nostril -->
  <path d="M60,32 Q64,26 60,20" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
  <path d="M62,30 Q66,22 62,16" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>

  <!-- Scale details on head -->
  <circle cx="30" cy="32" r="2" fill="#06b6d4" opacity="0.15"/>
  <circle cx="36" cy="36" r="2" fill="#8b5cf6" opacity="0.15"/>
  <circle cx="24" cy="38" r="2" fill="#06b6d4" opacity="0.12"/>
  <circle cx="32" cy="42" r="1.8" fill="#8b5cf6" opacity="0.1"/>
</svg>