<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="ng">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ng2">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Hoodie body -->
  <path d="M20,128 L20,98 C20,78 34,68 50,64 L78,64 C94,68 108,78 108,98 L108,128" fill="#0a0e17" stroke="url(#hg)" stroke-width="2.5" filter="url(#ng)"/>
  <!-- Hoodie inner shadow -->
  <path d="M28,128 L28,100 C28,84 38,74 52,70 L76,70 C90,74 100,84 100,100 L100,128" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.1"/>
  <!-- Hood -->
  <path d="M30,72 C24,60 22,44 28,30 C34,18 46,10 64,8 C82,10 94,18 100,30 C106,44 104,60 98,72" fill="#0a0e17" stroke="url(#hg)" stroke-width="2.5" filter="url(#ng)"/>
  <!-- Hood inner edge -->
  <path d="M38,68 C34,58 32,46 36,34 C40,24 50,16 64,14 C78,16 88,24 92,34 C96,46 94,58 90,68" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.2"/>
  <!-- Face shadow area -->
  <ellipse cx="64" cy="50" rx="22" ry="24" fill="#0a0e17" opacity="0.6"/>
  <!-- Left eye — glowing -->
  <rect x="46" y="44" width="12" height="5" rx="2" fill="#06b6d4" filter="url(#ng2)"/>
  <!-- Right eye — glowing -->
  <rect x="70" y="44" width="12" height="5" rx="2" fill="#06b6d4" filter="url(#ng2)"/>
  <!-- Eye reflections -->
  <rect x="47" y="45" width="4" height="2" rx="1" fill="#fff" opacity="0.4"/>
  <rect x="71" y="45" width="4" height="2" rx="1" fill="#fff" opacity="0.4"/>
  <!-- Mouth/mask line -->
  <line x1="52" y1="60" x2="76" y2="60" stroke="#06b6d4" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <!-- Laptop glow from below -->
  <path d="M34,98 L94,98 L100,108 L28,108 Z" fill="#0a0e17" stroke="url(#hg)" stroke-width="2" filter="url(#ng)"/>
  <!-- Laptop screen glow -->
  <rect x="38" y="80" width="52" height="18" rx="2" fill="#0a0e17" stroke="url(#hg)" stroke-width="1.5" filter="url(#ng)"/>
  <!-- Screen content — code lines -->
  <line x1="42" y1="86" x2="56" y2="86" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="42" y1="90" x2="62" y2="90" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="42" y1="94" x2="52" y2="94" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Screen reflection on face -->
  <ellipse cx="64" cy="56" rx="16" ry="8" fill="#06b6d4" opacity="0.03"/>
  <!-- Ambient glow behind -->
  <circle cx="64" cy="60" r="50" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.06"/>
  <circle cx="64" cy="60" r="58" fill="none" stroke="#8b5cf6" stroke-width="0.8" opacity="0.04"/>
  <!-- Binary rain beside -->
  <text x="8" y="24" fill="#06b6d4" font-family="monospace" font-size="7" opacity="0.1">0</text>
  <text x="8" y="36" fill="#06b6d4" font-family="monospace" font-size="7" opacity="0.08">1</text>
  <text x="8" y="48" fill="#06b6d4" font-family="monospace" font-size="7" opacity="0.06">1</text>
  <text x="116" y="28" fill="#8b5cf6" font-family="monospace" font-size="7" opacity="0.1">1</text>
  <text x="116" y="40" fill="#8b5cf6" font-family="monospace" font-size="7" opacity="0.08">0</text>
  <text x="116" y="52" fill="#8b5cf6" font-family="monospace" font-size="7" opacity="0.06">0</text>
</svg>