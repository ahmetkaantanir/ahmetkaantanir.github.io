<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="eg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="gl3">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gl4">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer eye/scan shape -->
  <path d="M8,64 C8,64 36,24 64,24 C92,24 120,64 120,64 C120,64 92,104 64,104 C36,104 8,64 8,64Z" fill="#0a0e17" stroke="url(#eg)" stroke-width="3" filter="url(#gl3)"/>
  <!-- Inner eye shape -->
  <path d="M20,64 C20,64 40,36 64,36 C88,36 108,64 108,64 C108,64 88,92 64,92 C40,92 20,64 20,64Z" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.25"/>
  <!-- Iris -->
  <circle cx="64" cy="64" r="22" fill="none" stroke="url(#eg)" stroke-width="3" filter="url(#gl3)"/>
  <!-- Inner iris ring -->
  <circle cx="64" cy="64" r="14" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.4"/>
  <!-- Pupil -->
  <circle cx="64" cy="64" r="8" fill="#06b6d4" filter="url(#gl4)"/>
  <!-- Pupil core -->
  <circle cx="64" cy="64" r="3" fill="#0a0e17"/>
  <!-- Scan line -->
  <line x1="64" y1="24" x2="64" y2="104" stroke="#06b6d4" stroke-width="1" opacity="0.15"/>
  <line x1="8" y1="64" x2="120" y2="64" stroke="#06b6d4" stroke-width="1" opacity="0.15"/>
  <!-- Digital circuit lines from eye -->
  <path d="M86,64 L98,64 L98,50 L108,50" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M64,86 L64,96 L78,96 L78,104" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M42,64 L30,64 L30,78 L20,78" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M64,42 L64,32 L50,32 L50,24" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <!-- Circuit dots -->
  <circle cx="108" cy="50" r="2.5" fill="#8b5cf6" opacity="0.5" filter="url(#gl3)"/>
  <circle cx="78" cy="104" r="2.5" fill="#06b6d4" opacity="0.5" filter="url(#gl3)"/>
  <circle cx="20" cy="78" r="2.5" fill="#8b5cf6" opacity="0.5" filter="url(#gl3)"/>
  <circle cx="50" cy="24" r="2.5" fill="#06b6d4" opacity="0.5" filter="url(#gl3)"/>
  <!-- Eye shine -->
  <circle cx="58" cy="58" r="3.5" fill="#fff" opacity="0.6"/>
  <circle cx="70" cy="68" r="1.5" fill="#fff" opacity="0.3"/>
</svg>