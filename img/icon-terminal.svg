<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="gl2">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Terminal window -->
  <rect x="12" y="16" width="104" height="96" rx="10" fill="#0a0e17" stroke="url(#tg)" stroke-width="3" filter="url(#gl2)"/>
  <!-- Title bar -->
  <line x1="12" y1="34" x2="116" y2="34" stroke="#06b6d4" stroke-width="1.5" opacity="0.3"/>
  <!-- Window dots -->
  <circle cx="26" cy="25" r="3.5" fill="#ef4444" opacity="0.8"/>
  <circle cx="38" cy="25" r="3.5" fill="#f59e0b" opacity="0.8"/>
  <circle cx="50" cy="25" r="3.5" fill="#10b981" opacity="0.8"/>
  <!-- Prompt line 1: $ hack -->
  <text x="22" y="54" fill="#10b981" font-family="monospace" font-size="13" font-weight="bold" filter="url(#gl2)">$</text>
  <text x="36" y="54" fill="#06b6d4" font-family="monospace" font-size="13" filter="url(#gl2)">sudo nmap -sV</text>
  <!-- Prompt line 2 -->
  <text x="22" y="72" fill="#10b981" font-family="monospace" font-size="13" font-weight="bold" filter="url(#gl2)">$</text>
  <text x="36" y="72" fill="#8b5cf6" font-family="monospace" font-size="13" filter="url(#gl2)">exploit.py</text>
  <!-- Prompt line 3 with cursor -->
  <text x="22" y="90" fill="#10b981" font-family="monospace" font-size="13" font-weight="bold" filter="url(#gl2)">$</text>
  <rect x="36" y="80" width="8" height="14" fill="#06b6d4" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
  </rect>
  <!-- Matrix rain hint -->
  <text x="90" y="54" fill="#06b6d4" font-family="monospace" font-size="10" opacity="0.15">01</text>
  <text x="98" y="68" fill="#8b5cf6" font-family="monospace" font-size="10" opacity="0.12">10</text>
  <text x="86" y="82" fill="#06b6d4" font-family="monospace" font-size="10" opacity="0.1">11</text>
</svg>